model:
  name: Qwen/Qwen2.5-1.5B

lora:
  r: 16
  alpha: 32
  dropout: 0.05

grpo:
  num_generations: 8
  max_new_tokens: 256
  temperature: 0.8
  top_p: 0.95

training:
  learning_rate: 5e-7
  batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  kl_coef: 0.1
  clip_range: 0.2
  max_grad_norm: 1.0
  use_wandb: false

reward:
  classifier_path: outputs/classifier/best
  temperature: 1.0
  style_weight: 0.65
  length_bonus_weight: 0.1
  prompt_relevance_weight: 0.2
  repetition_penalty_weight: 0.15
  prompt_echo_penalty_weight: 0.1
  reference_copy_penalty_weight: 0.15
  target_length: 180
  reference_texts_path: data/processed/train
  reference_ngram_size: 8

prompts:
  path: data/processed/prompts
  # prompts are extracted from Marcelo's writing:
  # control tokens for style/language are added automatically when prompts are extracted

output:
  dir: outputs/grpo
